name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-collab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: SebasCarvajal11/crm-infra/.github/workflows/reusable-ci.yml@v2.1.0
    with:
      component: collab
      test_command: pnpm test:unit
    secrets: inherit
