services:
  crm-collab:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        PNPM_VERSION: ${PNPM_VERSION:-11.1.1}
    init: true
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_MODE: server
      DATABASE_URL: postgresql://collab_user:${COLLAB_DB_PASSWORD:-collabpassword}@postgres_db:5432/crm_database
      DB_SCHEMA: schema_collab
      PORT: 3001
      REDIS_URL: redis://redis:6379
      JWKS_URI: http://crm-auth:3000/api/v1/.well-known/jwks.json
      REDIS_STREAMS_KEY: stream:collab.events
      REDIS_CONSUMER_GROUP: group:collab.events
      AUTH_EVENTS_STREAM_KEY: stream:auth.identity
      AUTH_EVENTS_CONSUMER_GROUP: group:collab.auth-identity
      AUTH_EVENTS_MAX_RETRIES: 3
      AUTH_EVENTS_PENDING_IDLE_MS: 30000
      COLLAB_EVENTS_DLQ_STREAM_KEY: stream:collab.identity-dlq
      MEDIA_COMMANDS_STREAM_KEY: stream:collab.media-commands
      MEDIA_RESPONSES_STREAM_KEY: stream:media.asset-responses
      MEDIA_RESPONSES_CONSUMER_GROUP: group:collab.media-responses
      MEDIA_COMMAND_TIMEOUT_MS: 8000
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      shared_backplane:
        aliases:
          - collab

  crm-collab-outbox-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        PNPM_VERSION: ${PNPM_VERSION:-11.1.1}
    init: true
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_MODE: worker
      DATABASE_URL: postgresql://collab_user:${COLLAB_DB_PASSWORD:-collabpassword}@postgres_db:5432/crm_database
      DB_SCHEMA: schema_collab
      REDIS_URL: redis://redis:6379
      REDIS_STREAMS_KEY: stream:collab.events
      COLLAB_OUTBOX_INTERVAL_MS: 5000
      COLLAB_OUTBOX_BATCH_SIZE: 50
    command: ["pnpm", "worker:collab-outbox"]
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shared_backplane
