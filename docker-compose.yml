version: '3.8'

services:
  mod-collab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mod-collab
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      MOD_COLLAB_CORS: ${MOD_COLLAB_CORS:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      MOD_AUTH_URL: ${MOD_AUTH_URL:-http://host.docker.internal:3000}
      MOD_MEDIA_URL: ${MOD_MEDIA_URL:-http://host.docker.internal:3002}
      GATEWAY_TRUST_SECRET: ${GATEWAY_TRUST_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cima-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: mod-collab-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rootpassword}
      POSTGRES_DB: ${POSTGRES_DB:-crm_database}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./drizzle:/docker-entrypoint-initdb.d
    networks:
      - cima-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-crm_database}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  cima-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
